# ===== WSJ0-CHiME3 Oracle run (SI-SDR) =======
# NOTE: 2267 test files — q_percent=50 + K=5 => ~5600 runs; start small
# Prereq: wsj0_chime3/test_enhanced_baseline/_results.csv must exist (done)
cd /home/dsi/mayavb/PythonProjects/sgmse && CUDA_VISIBLE_DEVICES=1 python oracle_resample_eval.py \
  --test_dir /private/gannot-lab/gannot-lab1/datasets/WSJ0_chime3/test/noisy \
  --clean_dir /private/gannot-lab/gannot-lab1/datasets/WSJ0_chime3/test/clean \
  --baseline_enhanced_dir wsj0_chime3/test_enhanced_baseline \
  --work_dir wsj0_chime3/oracle_exp \
  --q_percent 50 \
  --K_list 1 2 5 \
  --seed_base 100 \
  --enhancement_cmd "CUDA_VISIBLE_DEVICES=1 python enhancement.py --test_dir /private/gannot-lab/gannot-lab1/datasets/WSJ0_chime3/test/noisy --ckpt checkpoints_updated/train_wsj0_2cta4cov_epoch=159.ckpt" \
  --metrics_cmd "CUDA_VISIBLE_DEVICES=1 python calc_metrics.py --clean_dir /private/gannot-lab/gannot-lab1/datasets/WSJ0_chime3/test/clean --noisy_dir /private/gannot-lab/gannot-lab1/datasets/WSJ0_chime3/test/noisy"


